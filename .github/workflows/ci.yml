name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build estático
        run: npm run build

      - name: Testes unitários (atribuição)
        run: npm test

      - name: Instalar Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: E2E + acessibilidade (axe)
        run: npm run test:e2e

      - name: Lighthouse CI (orçamento de performance)
        run: npx -y @lhci/cli autorun

      - name: Artefatos do Playwright (em falha)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
